name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6 \
            dbus-x11 \
            dconf-cli \
            dconf-gsettings-backend \
            gsettings-desktop-schemas

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          # Clean previous builds
          rm -rf dist/ build/ *.spec
          
          # Build with PyInstaller
          pyinstaller \
            --onefile \
            --name "wallppy-linux-${TAG}" \
            --add-data ".resources:.resources" \
            --icon ".resources/wallppy.ico" \
            --noconfirm \
            --noupx \
            main.py
          
          # Verify the binary
          echo "Binary size:"
          ls -lh dist/
          
          # Make executable
          chmod +x "dist/wallppy-linux-${TAG}"
          
          # Show linked libraries (for debugging)
          echo "Linked libraries:"
          ldd "dist/wallppy-linux-${TAG}" 2>&1 | head -20 || true

      - name: Prepare release assets
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          # Create a bundled directory for users who prefer tarball
          mkdir -p "wallppy-${TAG}-linux"
          cp "dist/wallppy-linux-${TAG}" "wallppy-${TAG}-linux/wallppy"
          cp -r .resources "wallppy-${TAG}-linux/"
          cp wallppy-installer.sh "wallppy-${TAG}-linux/"
          
          # Create tarball
          tar -czf "dist/wallppy-${TAG}-linux.tar.gz" "wallppy-${TAG}-linux/"
          
          # Copy installer to dist
          chmod +x wallppy-installer.sh
          cp wallppy-installer.sh "dist/wallppy-installer.sh"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wallppy-linux-*
            dist/wallppy-*-linux.tar.gz
            dist/wallppy-installer.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}