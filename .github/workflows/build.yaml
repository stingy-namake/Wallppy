name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Use a more desktop-like environment
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install full desktop environment dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libxcb-glx0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6 \
            dbus-x11 \
            dconf-cli \
            dconf-gsettings-backend \
            gsettings-desktop-schemas \
            libglib2.0-bin

      - name: Start virtual D-Bus session
        run: |
          # Start a dbus session for the build (helps PyInstaller find proper libraries)
          export DBUS_SESSION_BUS_ADDRESS=$(dbus-daemon --session --fork --print-address)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          # Clean previous builds
          rm -rf dist/ build/ *.spec
          
          # Build with PyInstaller - CRITICAL: do NOT strip symbols
          # Stripping can break dynamic library loading
          pyinstaller \
            --onefile \
            --name "wallppy-linux-${TAG}" \
            --add-data ".resources:.resources" \
            --icon ".resources/wallppy.ico" \
            --noconfirm \
            --noupx \
            --strip=False \
            main.py
          
          # Verify the binary
          echo "Binary size:"
          ls -lh dist/
          
          # Make executable
          chmod +x "dist/wallppy-linux-${TAG}"

      - name: Test binary can run
        run: |
          # Test that the binary doesn't immediately crash
          timeout 2 "dist/wallppy-linux-${{ github.ref_name }}" --help 2>&1 || true
          echo "Binary test completed"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/wallppy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}