name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # <-- add this line

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          # If manually triggered without a tag, use a default name
          if [ "$TAG" = "manual" ]; then TAG="dev"; fi
          BINARY_NAME="wallpy-linux-${TAG}"
          pyinstaller --onefile --name "$BINARY_NAME" wallpy/main.py

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/wallpy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}