name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6 \
            imagemagick \
            desktop-file-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create PyInstaller spec file
        run: |
          cat > wallppy.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          
          import sys
          import os
          from PyInstaller.utils.hooks import collect_data_files, collect_submodules
          
          core_hiddenimports = collect_submodules('core')
          ui_hiddenimports = collect_submodules('ui')
          extensions_hiddenimports = collect_submodules('extensions')
          
          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[
                  ('.resources', '.resources'),
              ] + collect_data_files('core') + collect_data_files('ui') + collect_data_files('extensions'),
              hiddenimports=[
                  'PIL', 'PIL.Image', 'PIL._imaging', 'PIL.ImageFile',
                  'requests', 'urllib3', 'certifi', 'charset_normalizer',
                  'bs4', 'bs4.builder', 'bs4.element',
                  'json', 'hashlib', 're', 'os', 'sys', 'pathlib', 'typing',
                  'threading', 'concurrent.futures', 'logging', 'traceback',
              ] + core_hiddenimports + ui_hiddenimports + extensions_hiddenimports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=['tkinter', 'matplotlib', 'pandas', 'scipy', 'IPython', 'jupyter', 'notebook', 'sphinx', 'pytest', 'setuptools', 'pip'],
              noarchive=False,
          )
          
          pyz = PYZ(a.pure)
          
          exe = EXE(
              pyz, a.scripts, a.binaries, a.datas, [],
              name='wallppy', debug=False, bootloader_ignore_signals=False,
              strip=False, upx=True, upx_exclude=[], runtime_tmpdir=None,
              console=False, disable_windowed_traceback=False,
              argv_emulation=False, target_arch=None, codesign_identity=None,
              entitlements_file=None,
              icon='.resources/wallppy.ico' if os.path.exists('.resources/wallppy.ico') else None,
          )
          EOF

      - name: Build binary with PyInstaller
        run: |
          rm -rf dist/ build/
          pyinstaller --noconfirm wallppy.spec
          
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          mv dist/wallppy "dist/wallppy-linux-${TAG}"
          chmod +x "dist/wallppy-linux-${TAG}"
          
          echo "Binary created:"
          ls -lh dist/

      - name: Create install script
        run: |
          cp install.sh dist/
          chmod +x dist/install.sh

      - name: Package release files
        run: |
          cd dist
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          tar -czf "wallppy-linux-${TAG}.tar.gz" "wallppy-linux-${TAG}" install.sh
          echo "Package created:"
          ls -lh *.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wallppy-linux-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}