name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libxcb-glx0 \
            libxcb-dri2-0 \
            libxcb-dri3-0 \
            libxcb-present0 \
            libxcb-composite0 \
            libxcb-cursor0 \
            libxcb-damage0 \
            libxcb-dpms0 \
            libxcb-record0 \
            libxcb-res0 \
            libxcb-screensaver0 \
            libxcb-shm0 \
            libxcb-xv0 \
            libxcb-xvmc0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create PyInstaller spec file
        run: |
          cat > wallppy.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          
          import sys
          import os
          from PyInstaller.utils.hooks import collect_data_files, collect_submodules
          
          # Collect all core modules
          core_hiddenimports = collect_submodules('core')
          ui_hiddenimports = collect_submodules('ui')
          extensions_hiddenimports = collect_submodules('extensions')
          
          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[
                  ('.resources', '.resources'),
              ] + collect_data_files('core') + collect_data_files('ui') + collect_data_files('extensions'),
              hiddenimports=[
                  'PIL',
                  'PIL.Image',
                  'PIL._imaging',
                  'PIL.ImageFile',
                  'PIL.ImageDraw',
                  'PIL.ImageFilter',
                  'requests',
                  'urllib3',
                  'certifi',
                  'charset_normalizer',
                  'bs4',
                  'bs4.builder',
                  'bs4.element',
                  'json',
                  'hashlib',
                  're',
                  'os',
                  'sys',
                  'pathlib',
                  'typing',
                  'threading',
                  'concurrent.futures',
                  'logging',
                  'traceback',
                  'datetime',
              ] + core_hiddenimports + ui_hiddenimports + extensions_hiddenimports,
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[
                  'tkinter',
                  'matplotlib',
                  'pandas',
                  'scipy',
                  'IPython',
                  'jupyter',
                  'notebook',
                  'sphinx',
                  'pytest',
                  'setuptools',
                  'pip',
              ],
              noarchive=False,
          )
          
          pyz = PYZ(a.pure)
          
          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.datas,
              [],
              name='wallppy',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon='.resources/wallppy.ico' if os.path.exists('.resources/wallppy.ico') else None,
          )
          EOF

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          # Clean any previous builds
          rm -rf dist/ build/
          
          # Build with spec file
          pyinstaller --noconfirm wallppy.spec
          
          # Rename the binary
          if [ -f "dist/wallppy" ]; then
            mv dist/wallppy "dist/wallppy-linux-${TAG}"
          else
            echo "ERROR: Binary not found!"
            ls -la dist/
            exit 1
          fi
          
          # Verify the binary
          echo "Binary size:"
          ls -lh dist/
          
          # Make executable
          chmod +x "dist/wallppy-linux-${TAG}"
          
          # Test basic execution (check if it can run without crashing)
          echo "Testing binary..."
          timeout 5 "dist/wallppy-linux-${TAG}" --help 2>/dev/null || true
          echo "Binary created successfully"

      - name: Create launcher script for better compatibility
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          cat > "dist/wallppy-linux-${TAG}.sh" << 'EOF'
          #!/bin/bash
          # Launcher script for wallppy - preserves desktop environment
          
          # Get the directory of this script
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          
          # Ensure DBUS session is available
          if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
              # Try to get from running session
              if [ -f ~/.dbus/session-bus/*-0 ]; then
                  source ~/.dbus/session-bus/*-0 2>/dev/null
              fi
          fi
          
          # Run the actual binary
          exec "$SCRIPT_DIR/wallppy-linux-${TAG}" "$@"
          EOF
          
          chmod +x "dist/wallppy-linux-${TAG}.sh"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wallppy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}